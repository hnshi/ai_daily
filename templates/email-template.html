<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 16px;
            opacity: 0.9;
        }

        .header .date {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 12px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: inline-block;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .content {
            padding: 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            display: block;
            width: 4px;
            height: 24px;
            background: #667eea;
            border-radius: 2px;
        }

        .article-item {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e9ecef;
        }

        .article-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .article-category {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 12px;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .article-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
            line-height: 1.4;
        }

        .article-summary {
            font-size: 15px;
            color: #6c757d;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .article-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #adb5bd;
            margin-bottom: 12px;
        }

        .article-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .read-more-btn {
            display: inline-block;
            padding: 10px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .read-more-btn:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        .footer {
            background: #f8f9fa;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #e9ecef;
        }

        .footer-links {
            margin-bottom: 16px;
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            margin: 0 12px;
            font-size: 14px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-text {
            font-size: 13px;
            color: #6c757d;
            line-height: 1.6;
        }

        .unsubscribe {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #dee2e6;
        }

        .unsubscribe a {
            color: #adb5bd;
            text-decoration: underline;
            font-size: 12px;
        }

        @media only screen and (max-width: 620px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                gap: 20px;
                padding: 15px 20px;
            }

            .stat-value {
                font-size: 20px;
            }

            .content {
                padding: 20px;
            }

            .article-title {
                font-size: 16px;
            }

            .article-summary {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- 头部 -->
        <div class="header">
            <h1>AI Daily 日报</h1>
            <p class="subtitle">每天 5 分钟，掌握 AI 前沿动态</p>
            <div class="date">{{DATE}}</div>
        </div>

        <!-- 统计数据 -->
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">{{TOTAL_ARTICLES}}</div>
                <div class="stat-label">今日资讯</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">{{TOTAL_CATEGORIES}}</div>
                <div class="stat-label">覆盖领域</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">{{TOTAL_SUBSCRIBERS}}</div>
                <div class="stat-label">订阅用户</div>
            </div>
        </div>

        <!-- 主要内容 -->
        <div class="content">
            <div class="section-title">今日热点</div>

            <!-- 文章列表 -->
            {{ARTICLES}}

            <!-- 结束语 -->
            <div style="margin-top: 30px; padding: 20px; background: linear-gradient(135deg, #f0f4ff 0%, #f9f0ff 100%); border-radius: 12px; border-left: 4px solid #667eea;">
                <p style="font-size: 15px; color: #1a1a1a; margin-bottom: 8px;">
                    <strong>💡 每日思考</strong>
                </p>
                <p style="font-size: 14px; color: #6c757d; line-height: 1.6;">
                    AI 技术正在以前所未有的速度发展，保持学习和关注是跟上时代的关键。希望今天的日报对你有所帮助！
                </p>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <div class="footer-links">
                <a href="https://ai-daily.vercel.app">访问网站</a>
                <a href="https://github.com/hnshi/ai_daily">GitHub</a>
                <a href="https://ai-daily.vercel.app/profile">个人中心</a>
            </div>
            <p class="footer-text">
                这封邮件由 AI Daily 自动发送<br>
                你收到这封邮件是因为你订阅了我们的每日日报
            </p>
            <div class="unsubscribe">
                <a href="{{UNSUBSCRIBE_URL}}">点击退订邮件</a>
            </div>
        </div>
    </div>
</body>
</html>
